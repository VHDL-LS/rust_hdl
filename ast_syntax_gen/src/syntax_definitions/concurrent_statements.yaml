# § 11: Concurrent Statements

DeclarationStatementSeparator: !Sequence
  - keyword: Begin

BlockHeader: !Sequence
  - node: GenericClause
    optional: true
  - node: GenericMapAspect
    optional: true
    terminated: SemiColon
  - node: PortClause
    optional: true
  - node: PortMapAspect
    optional: true
    terminated: SemiColon

BlockStatement: !Sequence
