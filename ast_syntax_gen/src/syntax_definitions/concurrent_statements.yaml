  - node: ConcurrentStatements
  - node: BlockEpilogue

BlockPreamble: !Sequence
  - node: Label
  - keyword: Block
  - node: Expression
    parenthesized: true
    optional: true
    name: condition
  - keyword: Is
    optional: true

BlockEpilogue: !Sequence
  - keyword: End
  - keyword: Block
  - token: Identifier
    optional: true
  - token: SemiColon

CaseGenerateAlternative: !Sequence
