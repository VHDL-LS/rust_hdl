  - node: CaseGenerateStatementEpilogue

CaseGenerateStatementPreamble: !Sequence
  - node: Label
  - keyword: Case
  - node: Expression
  - keyword: Generate

CaseGenerateStatementEpilogue: !Sequence
  - keyword: End
  - keyword: Generate
  - token: Identifier
    optional: true
  - token: SemiColon

