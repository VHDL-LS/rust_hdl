# §5: Types

AccessTypeDefinition: !Sequence
  - keyword: Access
  - node: SubtypeIndication

ArrayTypeDefinition: !Choice
  - node: UnboundedArrayDefinition
  - node: ConstrainedArrayDefinition

CompositeTypeDefinition: !Choice
  - node: ArrayTypeDefinition
  - node: RecordTypeDefinition

ConstrainedArrayDefinition: !Sequence
  - keyword: Array
  - node: IndexConstraint
  - keyword: Of
  - node: SubtypeIndication

# Supertype of `expression` and `subtype_indication`: a non-`open` discrete
# range is an optional resolution indication followed by an expression. The
# trailing expression covers both `expression` (e.g. `1 to N`) and the
# `name [range_constraint]` of a subtype indication (e.g. `T range 1 to N`),
# because `name` accepts a `RangeConstraint` tail and `to`/`downto` are
# binary operators.
DiscreteRangeNormal: !Sequence
  - node: ResolutionIndication
    optional: true
  - node: Expression

OpenDiscreteRange: !Sequence
  - keyword: Open

DiscreteRange: !Choice
  - node: DiscreteRangeNormal
  - node: OpenDiscreteRange

ElementDeclaration: !Sequence
  - node: IdentifierList
  - token: Colon
  - node: SubtypeIndication
  - token: SemiColon

EnumerationLiteral: !Choice
  - token: Identifier
  - token: CharacterLiteral

EnumerationTypeDefinition: !Sequence
  - token: LeftPar
  - node: EnumerationLiteral
    repeated: true
  - token: Comma
    repeated: true
  - token: RightPar

FileTypeDefinition: !Sequence
  - keyword: File
  - keyword: Of
  - node: Name

IdentifierList: !Sequence
  - token: Identifier
  - token: Comma

IncompleteTypeDeclaration: !Sequence
  - keyword: Type
  - token: Identifier
  - token: SemiColon

IndexSubtypeDefinition: !Sequence
  - node: Name
  - keyword: Range
  - token: BOX

PhysicalLiteral: !Sequence
  - token: AbstractLiteral
  - node: Name

PhysicalTypeDefinition: !Sequence
  - node: RangeConstraint
  - node: UnitDeclarations
  - node: PhysicalTypeDefinitionEpilogue

UnitDeclarations: !Sequence
  - keyword: Units
  - node: PrimaryUnitDeclaration
  - node: SecondaryUnitDeclaration
    repeated: true

PhysicalTypeDefinitionEpilogue: !Sequence
  - keyword: End
  - keyword: Units
  - token: Identifier
    name: name

PrimaryUnitDeclaration: !Sequence
  - token: Identifier
  - token: SemiColon

ProtectedTypeBody: !Sequence
  - node: ProtectedTypeBodyPreamble
  - node: Declarations
    optional: true
  - node: ProtectedTypeBodyEpilogue

ProtectedTypeBodyPreamble: !Sequence
  - keyword: Protected
  - keyword: Body

ProtectedTypeBodyEpilogue: !Sequence
  - keyword: End
  - keyword: Protected
  - keyword: Body
  - token: Identifier
    name: name

ProtectedTypeDeclaration: !Sequence
  - node: ProtectedTypeDeclarationPreamble
  - node: Declarations
    optional: true
  - node: ProtectedTypeDeclarationEpilogue

ProtectedTypeDeclarationPreamble: !Sequence
  - keyword: Protected

ProtectedTypeDeclarationEpilogue: !Sequence
  - keyword: End
  - keyword: Protected
  - token: Identifier
    name: name

ProtectedTypeDefinition: !Choice
  - node: ProtectedTypeDeclaration
  - node: ProtectedTypeBody

# `to`/`downto` are now `BinaryOperator`s, so an `a to b` range parses as a
# `BinaryExpression`. `range_constraint` therefore takes a plain expression.
RangeConstraint: !Sequence
  - keyword: Range
  - node: Expression

RecordTypeDefinition: !Sequence
  - node: RecordTypeDefinitionPreamble
  - node: RecordElementDeclarations
    optional: true
  - node: RecordTypeDefinitionEpilogue

RecordElementDeclarations: !Sequence
  - node: ElementDeclaration
    repeated: true

RecordTypeDefinitionPreamble: !Sequence
  - keyword: Record

RecordTypeDefinitionEpilogue: !Sequence
  - keyword: End
  - keyword: Record
  - token: Identifier

NumericTypeDefinition: !Sequence
  - node: RangeConstraint

ScalarTypeDefinition: !Choice
  - node: EnumerationTypeDefinition
  - node: NumericTypeDefinition
  - node: PhysicalTypeDefinition

SecondaryUnitDeclaration: !Sequence
  - token: Identifier
  - token: EQ
  - node: PhysicalLiteral
  - token: SemiColon

IndexConstraint: !Sequence
  - token: LeftPar
  - node: DiscreteRange
    repeated: true
  - token: Comma
    repeated: true
  - token: RightPar

IndexSubtypeDefinitionList: !Sequence
  - node: IndexSubtypeDefinition
    repeated: true
  - token: Comma
    repeated: true

UnboundedArrayDefinition: !Sequence
  - keyword: Array
  - token: LeftPar
  - node: IndexSubtypeDefinitionList
    optional: true
  - token: RightPar
  - keyword: Of
  - node: SubtypeIndication
