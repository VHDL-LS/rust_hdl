# §9: Expression

Literal: !Choice
  - token: BitStringLiteral
  - token: CharacterLiteral
  - token: StringLiteral
  - token: AbstractLiteral
  - keyword: "Null"

ParenthesizedExpressionOrAggregate: !Sequence
  - token: LeftPar
  - node: ElementAssociation
    repeated: true
  - token: Comma
    repeated: true
  - token: RightPar

UnaryOperator: !Choice
  - token: QueQue
  - token: Plus
  - token: Minus
  - keyword: Abs
  - keyword: Not
  - keyword: And
  - keyword: Or
  - keyword: Nand
  - keyword: Nor
  - keyword: Xor
  - keyword: Xnor

UnaryExpression: !Sequence
  - node: UnaryOperator
    name: op
  - node: Expression

BinaryOperator: !Choice
  - keyword: And
  - keyword: Or
  - keyword: Nand
  - keyword: Nor
  - keyword: Xor
  - keyword: Xnor
  - token: EQ
  - token: NE
  - token: LT
  - token: LTE
  - token: GT
  - token: GTE
  - token: QueEQ
  - token: QueNE
  - token: QueLTE
  - token: QueLT
  - token: QueGT
  - token: QueGTE
  - keyword: Sll
  - keyword: Srl
  - keyword: Sla
  - keyword: Sra
  - keyword: Rol
  - keyword: Ror
  - token: Plus
  - token: Minus
  - token: Concat
  - token: Times
  - token: Div
  - keyword: Mod
  - keyword: Rem
  - token: Pow
  # `to`/`downto` are folded into `BinaryOperator` so an `a to b` range
  # parses as a `BinaryExpression`, removing the need for a separate `range`
  # production.
  - keyword: To
  - keyword: Downto

BinaryExpression: !Sequence
  - node: Expression
    name: lhs
  - node: BinaryOperator
    name: op
  - node: Expression
    name: rhs

LiteralExpression: !Sequence
  - node: Literal

PhysicalLiteralExpression: !Sequence
  - node: PhysicalLiteral

NameExpression: !Sequence
  - node: Name

QualifiedExpression: !Sequence
  - node: Name
  - token: Tick
  - node: ParenthesizedExpressionOrAggregate

Expression: !Choice
  - node: LiteralExpression
  - node: PhysicalLiteralExpression
  - node: UnaryExpression
  - node: BinaryExpression
  - node: ParenthesizedExpressionOrAggregate
  - node: Allocator
  - node: NameExpression
  - node: QualifiedExpression

Aggregate: !Sequence
  - token: LeftPar
  - node: ElementAssociation
    repeated: true
  - token: Comma
    repeated: true
  - token: RightPar

# LRM has `new subtype_indication | new qualified_expression`. Additionally:
# "A subtype indication that is part of an allocator shall not include a resolution indication" (LRM 9.3.7)
# Applying unification yields: `allocator ::= name`:
# LRM: `allocator ::= new subtype_indication | new qualified_expression`.
# Both forms are subsumed by `Expression` (subtype_indication is reached as
# `NameExpression` with optional constraints on the underlying `Name`);
# analysis sorts the two cases out later.
Allocator: !Sequence
  - keyword: New
  - node: Expression

OthersChoice: !Sequence
  - keyword: Others

ExpressionChoice: !Sequence
  - node: Expression

Choice: !Choice
  - node: ExpressionChoice
  - node: OthersChoice

Choices: !Sequence
  - node: Choice
    repeated: true
  - token: Bar
    repeated: true

ElementAssociation: !Sequence
  - node: Choices
    optional: true
  - token: RightArrow
    optional: true
  - node: Expression
