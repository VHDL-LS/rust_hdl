# §9: Expression

Literal: !Choice
  - token: BitStringLiteral
  - token: CharacterLiteral
  - token: StringLiteral
  - token: AbstractLiteral
  - keyword: "Null"

ParenthesizedExpressionOrAggregate: !Sequence
  - token: LeftPar
  - node: ElementAssociation
    repeated: true
  - token: Comma
    repeated: true
  - token: RightPar

UnaryOperator: !Choice
  - token: QueQue
  - token: Plus
  - token: Minus
  - keyword: Abs
  - keyword: Not
  - keyword: And
  - keyword: Or
  - keyword: Nand
  - keyword: Nor
  - keyword: Xor
  - keyword: Xnor

UnaryExpression: !Sequence
  - node: UnaryOperator
    name: op
  - node: Expression

BinaryOperator: !Choice
  - keyword: And
  - keyword: Or
  - keyword: Nand
  - keyword: Nor
  - keyword: Xor
  - keyword: Xnor
  - token: EQ
  - token: NE
  - token: LT
  - token: LTE
  - token: GT
  - token: GTE
  - token: QueEQ
  - token: QueNE
  - token: QueLTE
  - token: QueLT
  - token: QueGT
  - token: QueGTE
  - keyword: Sll
  - keyword: Srl
  - keyword: Sla
  - keyword: Sra
  - keyword: Rol
  - keyword: Ror
  - token: Plus
  - token: Minus
  - token: Concat
  - token: Times
  - token: Div
  - keyword: Mod
  - keyword: Rem
  - token: Pow
  # `to`/`downto` are folded into `BinaryOperator` so an `a to b` range
  # parses as a `BinaryExpression`, removing the need for a separate `range`
  # production.
  - keyword: To
  - keyword: Downto

BinaryExpression: !Sequence
  - node: Expression
    name: lhs
  - node: BinaryOperator
    name: op
  - node: Expression
    name: rhs

LiteralExpression: !Sequence
  - node: Literal

PhysicalLiteralExpression: !Sequence
  - node: PhysicalLiteral

NameExpression: !Sequence
  - node: Name

# `QualifiedExpression` (`T'(expr)`) and `TypeConversion` (`T(expr)`) are
# reached via `NameExpression`: `Name` has a `QualifiedTail` and a
# `ParenthesizedName` tail that produce both forms.
Expression: !Choice
  - node: LiteralExpression
  - node: PhysicalLiteralExpression
  - node: UnaryExpression
  - node: BinaryExpression
  - node: ParenthesizedExpressionOrAggregate
  - node: Allocator
  - node: NameExpression

Aggregate: !Sequence
  - token: LeftPar
  - node: ElementAssociation
    repeated: true
  - token: Comma
    repeated: true
  - token: RightPar

# LRM has `new subtype_indication | new qualified_expression`. Both are unified
# here: `qualified_expression` is reachable as a `Name` with a qualified tail,
# and `SubtypeIndication = [resolution_indication] Name`, so a single
# `new subtype_indication` covers both forms.
Allocator: !Sequence
  - keyword: New
  - node: SubtypeIndication

OthersChoice: !Sequence
  - keyword: Others

ExpressionChoice: !Sequence
  - node: Expression

Choice: !Choice
  - node: ExpressionChoice
  - node: OthersChoice

Choices: !Sequence
  - node: Choice
    repeated: true
  - token: Bar
    repeated: true

ElementAssociation: !Sequence
  - node: Choices
    optional: true
  - token: RightArrow
    optional: true
  - node: Expression
