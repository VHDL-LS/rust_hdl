# PSL directives
# Currently, PSL is not supported, but will produce some tokens.

PslDirective: !Sequence [ ]

PslPropertyDeclaration: !Sequence [ ]

PslSequenceDeclaration: !Sequence [ ]

PslClockDeclaration: !Sequence [ ]

# Mock placeholder until PSL is supported. The leading `vunit` keyword keeps the
# node non-empty-capable (a real verification unit is never empty), so it does
# not spuriously make `library_unit` and its wrappers optional.
PslVerificationUnit: !Sequence
  - keyword: Vunit
