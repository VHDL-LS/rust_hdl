# LRM has `name | name "(" formal_designator ")" | type_mark "(" formal_designator ")"`.
# The `name "(" ... ")"` and `type_mark "(" ... ")"` forms reduce to a `Name`
# with a `ParenthesizedName` tail, so a plain `Name` covers all cases.
FormalPart: !Sequence
  - node: Name

FullTypeDeclaration: !Sequence
  - keyword: Type
  - token: Identifier
  - keyword: Is
  - node: TypeDefinition
  - token: SemiColon

GenericClause: !Sequence
  - node: GenericClausePreamble
  - node: InterfaceList
    optional: true
  - node: GenericClauseEpilogue

GenericClausePreamble: !Sequence
