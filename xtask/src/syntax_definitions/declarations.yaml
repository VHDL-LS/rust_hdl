# LRM has `[resolution_indication] type_mark [constraint]`. Here `type_mark`
# becomes `Name`, and constraints (range/index/record) are absorbed as
# `NameTail` items, so no explicit `Constraint` slot is needed.
SubtypeIndication: !Sequence
  - node: ResolutionIndication
    optional: true
  - node: Name

