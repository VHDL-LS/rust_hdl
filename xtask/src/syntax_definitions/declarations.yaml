  - token: LeftPar

GenericClauseEpilogue: !Sequence
  - token: RightPar
  - token: SemiColon

GenericMapAspect: !Sequence
  - keyword: Generic
  - keyword: Map
  - token: LeftPar
  - node: AssociationList
    optional: true
  - token: RightPar

# LRM has `"group" identifier ":" name "(" group_constituent_list ")" ";"`.
# The `(group_constituent_list)` is absorbed as a `ParenthesizedName` tail on
# the preceding `Name`, so no explicit list/parens are needed here.
GroupDeclaration: !Sequence
  - keyword: Group
  - token: Identifier
  - token: Colon
  - node: Name
  - token: SemiColon

GroupTemplateDeclaration: !Sequence
  - keyword: Group
  - token: Identifier
  - keyword: Is
  - token: LeftPar
  - node: EntityClassEntryList
    optional: true
  - token: RightPar
  - token: SemiColon

