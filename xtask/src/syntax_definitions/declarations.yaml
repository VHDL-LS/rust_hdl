# LRM:
#   actual_part       ::= actual_designator | name "(" actual_designator ")"
#                       | type_mark "(" actual_designator ")"
#   actual_designator ::= [inertial] expression | subtype_indication | open
#
# Disambiguation between `Expression` and `SubtypeIndication` is done at
# parse time by lookahead: the only syntactic discriminator is a second
# name following the first (the resolution_function_name + type_mark
# pattern, or the `(element_resolution)` + type_mark pattern). The wrapped
# `name "(" actual_designator ")"` forms collapse into `Expression`
# because `Name` accepts a `ParenthesizedName` tail; analysis disambiguates
# type conversions / resolution functions later.
ActualPartExpression: !Sequence
  - node: Expression

ActualPartSubtypeIndication: !Sequence
  - node: SubtypeIndication

ActualPartOpen: !Sequence
  - keyword: Open

ActualPartBody: !Choice
  - node: ActualPartExpression
  - node: ActualPartSubtypeIndication
  - node: ActualPartOpen

ActualPart: !Sequence
  - keyword: Inertial
    optional: true
  - node: ActualPartBody

AliasDeclaration: !Sequence
  - keyword: Alias
  - node: AliasDesignator
  - token: Colon
    optional: true
  - node: SubtypeIndication
    optional: true
  - keyword: Is
  - node: Name
  - node: Signature
    optional: true
  - token: SemiColon

AliasDesignator: !Choice
  - token: Identifier
  - token: CharacterLiteral
  - token: StringLiteral

AssociationElement: !Sequence
  - node: FormalPart
    optional: true
  - token: RightArrow
    optional: true
  - node: ActualPart

AssociationList: !Sequence
  - node: AssociationElement
    repeated: true
  - token: Comma
    repeated: true

AttributeDeclaration: !Sequence
  - keyword: Attribute
  - token: Identifier
