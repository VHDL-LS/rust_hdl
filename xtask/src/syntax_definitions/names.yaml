# §8: Names

AbsolutePathname: !Sequence
  - token: Dot
  - node: PartialPathname

# `(expression)` after the attribute designator becomes a separate
# `ParenthesizedName` tail on the enclosing `Name`. The signature brackets
# are also a name tail position; analysis associates them with this attribute.
AttributeName: !Sequence
  - node: Signature
    optional: true
  - token: Tick
  - token: Identifier
    name: attribute_designator_token

ExternalName: !Choice
  - node: ExternalConstantName
  - node: ExternalSignalName
  - node: ExternalVariableName

ExternalConstantName: !Sequence
  - token: LtLt
  - keyword: Constant
  - node: ExternalPathName
  - token: Colon
  - node: SubtypeIndication
  - token: GtGt

ExternalSignalName: !Sequence
  - token: LtLt
  - keyword: Signal
  - node: ExternalPathName
  - token: Colon
  - node: SubtypeIndication
  - token: GtGt

ExternalVariableName: !Sequence
  - token: LtLt
  - keyword: Variable
  - node: ExternalPathName
  - token: Colon
  - node: SubtypeIndication
  - token: GtGt

ExternalPathName: !Choice
  - node: PackagePathname
  - node: AbsolutePathname
  - node: RelativePathname

PackagePathname: !Sequence
  - token: CommAt
  - token: Dot
    repeated: true
  - token: Identifier
    name: simple_name
    repeated: true

RelativePathname: !Sequence
  - token: Circ
    repeated: true
  - token: Dot
    repeated: true
  - node: PartialPathname
    optional: true

PartialPathname: !Sequence
  - token: Identifier
    repeated: true
  - token: Dot
    repeated: true

NameList: !Sequence
  - node: Name
    repeated: true
  - token: Comma
    repeated: true

Label: !Sequence
  - token: Identifier
  - token: Colon

Designator: !Choice
  - token: Identifier
  - token: StringLiteral

NameDesignator: !Choice
  - token: Identifier
  - token: StringLiteral
  - token: CharacterLiteral

Name: !Sequence
  - node: NamePrefix
  - node: NameTail
    repeated: true
  # `RangeConstraint` appears here so the constraint of a `subtype_indication`
  # (e.g. `integer range 1 to 10`) parses as a `Name` followed by a tail —
  # see the comment on `SubtypeIndication`.
  - node: RangeConstraint
    optional: true

NameDesignatorPrefix: !Sequence
  - node: NameDesignator

NamePrefix: !Choice
  - node: ExternalName
  - node: NameDesignatorPrefix

Suffix: !Choice
  - token: Identifier
  - token: StringLiteral
  - token: CharacterLiteral
  - keyword: All

SelectedName: !Sequence
  - token: Dot
  - node: Suffix

# Indexed names, slice names, function calls, type conversions, and the
# `group_constituent_list` of a group declaration all collapse to this
# parenthesized association list. Analysis decides which one it is.
ParenthesizedName: !Sequence
  - token: LeftPar
  - node: AssociationList
    optional: true
  - token: RightPar

NameTail: !Choice
  - node: SelectedName
  - node: ParenthesizedName
  - node: AttributeName
